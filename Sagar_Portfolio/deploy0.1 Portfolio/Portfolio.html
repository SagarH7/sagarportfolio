<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  @keyframes k-marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-33.333%); }
  }
  @keyframes k-fade {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes p-float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -30px) scale(1.1); }
  }
  @keyframes p-draw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes p-wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(-18deg); }
    75% { transform: rotate(14deg); }
  }
</style>

<body>

<div class="variation-bar" id="variation-bar">
  <button data-v="subtle">Subtle</button>
  <button data-v="kinetic" class="active">Kinetic</button>
  <button data-v="playful">Playful</button>
  <span class="dot"></span>
  <a class="resume-link" href="resume.pdf" target="_blank" rel="noopener">Resume ↗</a>
</div>

<div id="subtle-root" class="variation-root active" data-screen-label="Subtle"></div>
<div id="kinetic-root" class="variation-root" data-screen-label="Kinetic"></div>
<div id="playful-root" class="variation-root" data-screen-label="Playful"></div>

<!-- Tweaks panel (hidden until activated) -->
<div class="tweaks-panel" id="tweaks-panel">
  <h4>Tweaks</h4>
  <div class="tweak-row">
    <label>Accent hue</label>
    <div class="hue-swatches" id="hue-swatches"></div>
  </div>
  <div class="tweak-row">
    <label>Start variation</label>
    <select id="tweak-default-variation" class="tweak-toggle">
      <option value="subtle">Subtle</option>
      <option value="kinetic">Kinetic</option>
      <option value="playful">Playful</option>
    </select>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/subtle.jsx"></script>
<script type="text/babel" src="src/kinetic.jsx"></script>
<script type="text/babel" src="src/playful.jsx"></script>

<script>
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accentHue": 35,
    "defaultVariation": "kinetic"
  }/*EDITMODE-END*/;

  // Apply accent hue
  document.documentElement.style.setProperty('--accent-h', TWEAKS.accentHue);

  // Variation switching
  const LS_KEY = 'sagar-portfolio-variation';
  const roots = {
    subtle: document.getElementById('subtle-root'),
    kinetic: document.getElementById('kinetic-root'),
    playful: document.getElementById('playful-root'),
  };
  const mounted = { subtle: false, kinetic: false, playful: false };

  function mount(v) {
    if (mounted[v]) return;
    mounted[v] = true;
    const Component = v === 'subtle' ? window.SubtleVariation
      : v === 'kinetic' ? window.KineticVariation
      : window.PlayfulVariation;
    if (!Component) { mounted[v] = false; return; }
    ReactDOM.createRoot(roots[v]).render(React.createElement(Component));
  }

  function setVariation(v, persist = true) {
    Object.keys(roots).forEach(k => roots[k].classList.toggle('active', k === v));
    document.querySelectorAll('#variation-bar button').forEach(b => {
      b.classList.toggle('active', b.dataset.v === v);
    });
    mount(v);
    if (persist) localStorage.setItem(LS_KEY, v);
    window.scrollTo(0, 0);
  }

  document.querySelectorAll('#variation-bar button').forEach(b => {
    b.addEventListener('click', () => setVariation(b.dataset.v));
  });

  // Wait for babel to transpile before first mount
  function boot() {
    if (!window.SubtleVariation) { setTimeout(boot, 50); return; }
    // Default to kinetic unless user has explicitly switched
    const saved = localStorage.getItem(LS_KEY) || TWEAKS.defaultVariation || 'kinetic';
    setVariation(saved, false);
  }
  boot();

  // ---------- Tweaks panel protocol ----------
  const panel = document.getElementById('tweaks-panel');
  const hues = [
    { h: 35, name: 'amber' },
    { h: 20, name: 'rust' },
    { h: 140, name: 'sage' },
    { h: 220, name: 'slate' },
    { h: 280, name: 'plum' },
    { h: 0, name: 'ink' },
  ];
  const swatchWrap = document.getElementById('hue-swatches');
  hues.forEach(({ h, name }) => {
    const s = document.createElement('button');
    s.className = 'hue-swatch' + (h === TWEAKS.accentHue ? ' active' : '');
    s.style.background = `oklch(0.68 0.14 ${h})`;
    s.title = name;
    s.dataset.hue = h;
    s.addEventListener('click', () => {
      document.documentElement.style.setProperty('--accent-h', h);
      document.querySelectorAll('.hue-swatch').forEach(x => x.classList.toggle('active', x.dataset.hue == h));
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentHue: Number(h) } }, '*');
    });
    swatchWrap.appendChild(s);
  });

  const varSel = document.getElementById('tweak-default-variation');
  varSel.value = TWEAKS.defaultVariation || 'subtle';
  varSel.addEventListener('change', () => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { defaultVariation: varSel.value } }, '*');
  });

  window.addEventListener('message', (e) => {
    if (!e.data || !e.data.type) return;
    if (e.data.type === '__activate_edit_mode') panel.classList.add('open');
    else if (e.data.type === '__deactivate_edit_mode') panel.classList.remove('open');
  });
  window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
</body>
</html>
